<div class="filters-bar">
    <div class="form-group">
        <label>Producto</label>
        <select class="form-control" [ngModel]="inventoryService.filterProduct()"
            (ngModelChange)="inventoryService.updateFilter('product', $event)">
            @for (prod of inventoryService.uniqueProducts(); track prod) {
            <option [value]="prod">{{ prod }}</option>
            }
        </select>
    </div>
    <div class="form-group">
        <label>Estado</label>
        <select class="form-control" [ngModel]="inventoryService.filterStatus()"
            (ngModelChange)="inventoryService.updateFilter('status', $event)">
            <option value="Todos">Todos</option>
            <option value="VENCIDO">Vencido</option>
            <option value="Próximo a Vencer">Próximo a Vencer</option>
            <option value="Activo">Activo</option>
            <option value="Error Fecha">Error Fecha</option>
        </select>
    </div>
    <div class="form-group">
        <label>Fecha Desde</label>
        <input type="date" class="form-control" [ngModel]="inventoryService.filterDateFrom()"
            (ngModelChange)="inventoryService.updateFilter('dateFrom', $event)">
    </div>
    <div class="form-group">
        <label>Fecha Hasta</label>
        <input type="date" class="form-control" [ngModel]="inventoryService.filterDateTo()"
            (ngModelChange)="inventoryService.updateFilter('dateTo', $event)">
    </div>
</div>
